services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dfte
      POSTGRES_PASSWORD: dfte
      POSTGRES_DB: dfte
    ports:
      - "5432:5432"
    volumes:
      - dfte-postgres:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      DATABASE_URL: postgres://dfte:dfte@postgres:5432/dfte
      JWT_SECRET: "change-me"
      JWT_EXPIRES_IN: "1h"
      ADMIN_API_KEY: "change-me-admin"
      OPENAI_API_KEY: "change-me"
      GITHUB_WEBHOOK_SECRET: "change-me-webhook-secret"
      ALLOW_UNSIGNED_WEBHOOKS: "false"
      AGENT_MAX_ATTEMPTS: "3"
      TEST_TIMEOUT_MS: "600000"
      GITHUB_API_TIMEOUT_MS: "30000"
      MAX_FILE_CHARS: "4000"
      LOG_TRIM_CHARS: "20000"
    ports:
      - "3000:3000"
    depends_on:
      - postgres

volumes:
  dfte-postgres:

