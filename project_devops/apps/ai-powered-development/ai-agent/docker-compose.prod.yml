services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: digital-fte-platform:latest
    environment:
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1h}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-flash}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - ALLOW_UNSIGNED_WEBHOOKS=false
      - AGENT_MAX_ATTEMPTS=3
      - TEST_TIMEOUT_MS=600000
    ports:
      - "3000:3000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Note: Production setup assumes external Managed Postgres database.
# If you still need a local postgres, you can add it here but it's not recommended for production.
