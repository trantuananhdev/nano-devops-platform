---
# =============================================================================
# group_vars/acer.yml — Single source of truth for Acer Ubuntu
# =============================================================================
# T-55: Dual-user model — kết nối tutinhhao, escalate root khi cần.
#   - tutinhhao: SSH access, docker group, sở hữu /opt/llm-node
#   - root: qua become cho system tasks (apt, sysctl, ufw, docker install)
#
# Key: prod_deployer (ed25519) — inject vào CẢ 2 user trên Ubuntu ✅
# Test: ssh -i .ssh/prod_deployer tutinhhao@192.168.100.6
# Test: ssh -i .ssh/prod_deployer root@192.168.100.6

# ---------------------------------------------------------------------------
# SSH + Privilege Escalation
# ---------------------------------------------------------------------------
ansible_user: tutinhhao
ansible_become: true
ansible_become_user: root
ansible_become_method: sudo

# App user — dùng cho file ownership trên LLM node
app_user: tutinhhao
llm_app_owner: tutinhhao

# ---------------------------------------------------------------------------
# ZRAM — maximize RAM for 4GB physical
# ---------------------------------------------------------------------------
zram_algorithm: lz4
zram_size_mb: 6656           # 6.5 GB virtual budget (2:1 compression)

# ---------------------------------------------------------------------------
# SSD Swap (OOM safety net — lower priority than ZRAM)
# ---------------------------------------------------------------------------
swap_file_path: /swapfile
swap_file_size_mb: 4096
swap_priority: 10

# ---------------------------------------------------------------------------
# Kernel tuning
# ---------------------------------------------------------------------------
sysctl_settings:
  vm.swappiness: 100
  vm.vfs_cache_pressure: 50
  fs.file-max: 1048576
  net.core.somaxconn: 65535
  net.ipv4.tcp_rmem: "4096 87380 16777216"
  net.ipv4.tcp_wmem: "4096 65536 16777216"
  vm.overcommit_memory: 1

# ---------------------------------------------------------------------------
# UFW firewall — HDTV + LLM focused ports
# ---------------------------------------------------------------------------
ufw_rules:
  - { port: 22,   proto: tcp, comment: "SSH" }
  - { port: 80,   proto: tcp, comment: "HTTP" }
  - { port: 443,  proto: tcp, comment: "HTTPS" }
  - { port: 5432, proto: tcp, comment: "PostgreSQL (LAN only)" }
  - { port: 6379, proto: tcp, comment: "Redis (LAN only)" }
  - { port: 9090, proto: tcp, comment: "cAdvisor metrics" }
  - { port: 9443, proto: tcp, comment: "Portainer HTTPS" }
  - { port: 8080, proto: tcp, comment: "LLM llama-server (LAN)" }

# ---------------------------------------------------------------------------
# SSH Hardening (T-55) — áp dụng bởi role bootstrap
# ---------------------------------------------------------------------------
sshd_settings:
  PermitRootLogin: "prohibit-password"
  PasswordAuthentication: "no"
  PubkeyAuthentication: "yes"
  MaxAuthTries: "3"
  LoginGraceTime: "30"
  X11Forwarding: "no"
  AllowAgentForwarding: "no"

# ---------------------------------------------------------------------------
# Docker
# ---------------------------------------------------------------------------
docker_data_root: /var/lib/docker

# ---------------------------------------------------------------------------
# Observability
# ---------------------------------------------------------------------------
portainer_image: portainer/portainer-ce:2.20.3
cadvisor_image:  gcr.io/cadvisor/cadvisor:v0.49.1
