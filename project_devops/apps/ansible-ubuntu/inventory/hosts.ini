# =============================================================================
# Inventory — Acer Ubuntu Host (STATIC TEMPLATE with PLACEHOLDERS)
# =============================================================================
# PLACEHOLDERS below are intentional — do NOT put shell-style env refs (e.g. ${ACER_HOST}).
# Ansible treats unexpanded shell syntax literally → DNS fail.
#
# T-55: Dual-user model
#   - ansible_user=tutinhhao (từ group_vars) — kết nối mặc định
#   - become: true → sudo root khi cần system tasks
#   - Key: prod_deployer (ed25519) — inject vào CẢ root + tutinhhao ✅
#
# Runtime inventory (preferred — auto-generated):
#   Docker:  docker-entrypoint.sh generates /tmp/inventory.ini from .env
#   CLI:     ./cli.sh ansible-ping | ansible-bootstrap | ansible-deploy-llm
#
# Direct ansible-playbook (outside Docker):
#   ansible-playbook -i inventory/hosts.ini site.yml \
#     -e "ansible_host=192.168.100.6 ansible_port=22" \
#     --private-key=/absolute/path/to/.ssh/prod_deployer
#
# SSH prerequisites (bạn làm thủ công 1 lần trên Ubuntu server):
#   - root: inject prod_deployer.pub vào /root/.ssh/authorized_keys  ✅ DONE
#   - tutinhhao: inject prod_deployer.pub vào /home/tutinhhao/.ssh/authorized_keys  ✅ DONE
#
# Test: ./cli.sh ansible-test-users (kiểm tra cả 2 user)
# =============================================================================

[acer]
acer-host ansible_host=ACER_HOST_PLACEHOLDER ansible_port=ACER_SSH_PORT_PLACEHOLDER ansible_ssh_private_key_file=ANSIBLE_SSH_KEY_PLACEHOLDER
