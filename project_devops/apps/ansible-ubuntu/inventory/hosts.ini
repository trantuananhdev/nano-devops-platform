# =============================================================================
# Inventory — Acer AI Data Layer Host
# =============================================================================
# This file is a STATIC TEMPLATE used when running Ansible directly
# (outside Docker). When running via Docker Compose, the entrypoint
# auto-generates /tmp/inventory.ini from env vars (ACER_HOST, ACER_USER,
# ACER_SSH_PORT) — this file is NOT used inside the container.
#
# For direct (non-Docker) usage, set the values below or override via CLI:
#   ansible-playbook -i inventory/hosts.ini site.yml \
#     -e "ansible_host=192.168.100.26 ansible_user=tutinhhao"
# =============================================================================

[acer]
acer-host ansible_host=${ACER_HOST} ansible_user=${ACER_USER} ansible_port=${ACER_SSH_PORT:-22} ansible_ssh_private_key_file=../../.ssh/prod_key

[acer:vars]
ansible_python_interpreter=/usr/bin/python3
