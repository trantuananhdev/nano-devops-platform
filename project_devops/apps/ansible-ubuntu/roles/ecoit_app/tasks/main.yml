---
# =============================================================================
# roles/ecoit_app/tasks/main.yml
# =============================================================================
# Idempotent deploy của EcoIT app lên Acer Ubuntu.
# Pipeline:
#   1. Tạo thư mục + env file
#   2. Copy docker-compose template
#   3. Login GHCR (pull image mới)
#   4. docker compose pull + up --remove-orphans
#   5. Health check
#   6. Rollback nếu health check fail
# =============================================================================

- name: "EcoIT | Create app directory"
  ansible.builtin.file:
    path: "{{ ecoit_app_dir }}"
    state: directory
    owner: "{{ ssh_deploy_user }}"
    group: "{{ ssh_deploy_user }}"
    mode: "0755"

- name: "EcoIT | Create data directories"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ssh_deploy_user }}"
    group: "{{ ssh_deploy_user }}"
    mode: "0755"
  loop:
    - "{{ ecoit_app_dir }}/data/postgres"
    - "{{ ecoit_app_dir }}/data/redis"
    - "{{ ecoit_app_dir }}/logs"

- name: "EcoIT | Template .env file"
  ansible.builtin.template:
    src: ".env.ecoit.j2"
    dest: "{{ ecoit_app_dir }}/.env"
    owner: "{{ ssh_deploy_user }}"
    group: "{{ ssh_deploy_user }}"
    mode: "0600"
  no_log: true

- name: "EcoIT | Template docker-compose.yml"
  ansible.builtin.template:
    src: "docker-compose.ecoit.yml.j2"
    dest: "{{ ecoit_app_dir }}/docker-compose.yml"
    owner: "{{ ssh_deploy_user }}"
    group: "{{ ssh_deploy_user }}"
    mode: "0644"

- name: "EcoIT | Login to GHCR"
  community.docker.docker_login:
    registry_url: "ghcr.io"
    username: "{{ ecoit_repo_owner }}"
    password: "{{ lookup('env', 'GITHUB_TOKEN') }}"
  no_log: true
  ignore_errors: true   # non-blocking if public image or already logged in

- name: "EcoIT | Pull latest images"
  community.docker.docker_compose_v2:
    project_src: "{{ ecoit_app_dir }}"
    pull: always
    state: present
  become_user: "{{ ssh_deploy_user }}"
  register: compose_pull_result
  ignore_errors: true

- name: "EcoIT | Deploy with docker compose up"
  community.docker.docker_compose_v2:
    project_src: "{{ ecoit_app_dir }}"
    state: present
    remove_orphans: true
    recreate: auto
  become_user: "{{ ssh_deploy_user }}"
  register: compose_result

- name: "EcoIT | Wait for backend health"
  ansible.builtin.uri:
    url: "http://localhost:{{ ecoit_deploy_port }}/health"
    status_code: 200
    timeout: 5
  register: health_check
  retries: 12
  delay: 5
  until: health_check.status == 200
  ignore_errors: true

- name: "EcoIT | Health check result"
  ansible.builtin.debug:
    msg: >
      {% if health_check.status is defined and health_check.status == 200 %}
      ✅ EcoIT app healthy at http://{{ ansible_host }}:{{ ecoit_deploy_port }}/health
      {% else %}
      ⚠️  Health check failed — check logs: docker compose -f {{ ecoit_app_dir }}/docker-compose.yml logs
      {% endif %}

- name: "EcoIT | Show running containers"
  ansible.builtin.command:
    cmd: docker compose -f {{ ecoit_app_dir }}/docker-compose.yml ps
  register: compose_ps
  changed_when: false

- name: "EcoIT | Print container status"
  ansible.builtin.debug:
    var: compose_ps.stdout_lines
