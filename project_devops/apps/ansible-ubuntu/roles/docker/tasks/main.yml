---
# roles/docker/tasks/main.yml
# Install Docker CE + Compose V2 plugin (official Docker apt repo)

- name: "[Docker] Check if Docker is already installed"
  ansible.builtin.command: docker --version
  register: _docker_installed
  failed_when: false
  changed_when: false

- name: "[Docker] Create /etc/apt/keyrings directory"
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: _docker_installed.rc != 0

- name: "[Docker] Download Docker GPG key"
  ansible.builtin.shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
      | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg
  when: _docker_installed.rc != 0

- name: "[Docker] Add Docker apt repository"
  ansible.builtin.shell: |
    echo \
      "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
      https://download.docker.com/linux/ubuntu \
      $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
      > /etc/apt/sources.list.d/docker.list
  args:
    creates: /etc/apt/sources.list.d/docker.list
  when: _docker_installed.rc != 0

- name: "[Docker] Update apt cache (after adding Docker repo)"
  ansible.builtin.apt:
    update_cache: true
  when: _docker_installed.rc != 0

- name: "[Docker] Install Docker CE, CLI, containerd, Compose V2, Buildx"
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  when: _docker_installed.rc != 0

- name: "[Docker] Enable and start Docker daemon"
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: "[Docker] Enable and start containerd"
  ansible.builtin.systemd:
    name: containerd
    enabled: true
    state: started

- name: "[Docker] Add ansible_user to docker group (avoid sudo for docker CLI)"
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

- name: "[Docker] Configure Docker daemon options"
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "20m",
          "max-file": "5"
        },
        "data-root": "{{ docker_data_root }}",
        "storage-driver": "overlay2"
      }
  notify: Restart docker

- name: "[Docker] Smoke-test — docker version"
  ansible.builtin.command: docker version
  changed_when: false
  register: _docker_ver

- name: "[Docker] Print docker version"
  ansible.builtin.debug:
    var: _docker_ver.stdout_lines
