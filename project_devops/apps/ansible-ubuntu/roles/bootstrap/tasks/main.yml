---
# roles/bootstrap/tasks/main.yml
# Base system: package baseline + UFW firewall + sudoers + SSH hardening
# T-55: Thêm sudoers cho tutinhhao + SSH hardening

# ============================================================================
# Section 1: Packages
# ============================================================================
- name: "[Bootstrap] Update apt cache"
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: "[Bootstrap] Install essential packages"
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - lsb-release
      - apt-transport-https
      - python3-pip
      - htop
      - jq
      - unzip
      - sudo
    state: present

# ============================================================================
# Section 2: Sudoers — tutinhhao NOPASSWD (T-55)
# ============================================================================
- name: "[Bootstrap] Ensure tutinhhao has passwordless sudo"
  ansible.builtin.copy:
    dest: /etc/sudoers.d/tutinhhao
    content: |
      # T-55: Ansible dual-user — tutinhhao can sudo without password
      tutinhhao ALL=(ALL) NOPASSWD: ALL
    owner: root
    group: root
    mode: "0440"
    validate: '/usr/sbin/visudo -cf %s'

# ============================================================================
# Section 3: UFW Firewall
# ============================================================================
- name: "[Bootstrap] Install UFW"
  ansible.builtin.apt:
    name: ufw
    state: present

- name: "[Bootstrap] Reset UFW to defaults (idempotent)"
  ansible.builtin.command: ufw --force reset
  changed_when: false

- name: "[Bootstrap] Set UFW default incoming policy to deny"
  ansible.builtin.command: ufw default deny incoming
  changed_when: false

- name: "[Bootstrap] Set UFW default outgoing policy to allow"
  ansible.builtin.command: ufw default allow outgoing
  changed_when: false

- name: "[Bootstrap] Allow configured ports"
  community.general.ufw:
    rule: allow
    port: "{{ item.port | string }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ ufw_rules }}"

- name: "[Bootstrap] Enable UFW"
  community.general.ufw:
    state: enabled

# ============================================================================
# Section 4: SSH Hardening (T-55)
# ============================================================================
- name: "[SSH Hardening] Apply sshd_config settings"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?{{ item.key }}"
    line: "{{ item.key }} {{ item.value }}"
    state: present
    backup: "{{ ansible_loop.first }}"
  loop: "{{ sshd_settings | dict2items }}"
  loop_control:
    label: "{{ item.key }}={{ item.value }}"
    extended: true
  notify: Restart sshd

- name: "[SSH Hardening] Validate sshd_config syntax"
  ansible.builtin.command: sshd -t
  changed_when: false
  register: _sshd_validate
  failed_when: _sshd_validate.rc != 0
