---
# roles/ssh_bootstrap/tasks/main.yml
# =============================================================================
# One-time SSH key injection for ROOT + deploy-user access.
#
# Flow: connect as acer_user (ACER_USER) → become root → inject prod_key.pub
# into both users → harden sshd → restart ssh → reset connection.
#
# After this completes, verify-ssh.yml and site.yml connect as root via prod_key.
# =============================================================================

# ---------------------------------------------------------------------------
# 1. Ensure deploy user can sudo without password (idempotent)
# ---------------------------------------------------------------------------
- name: "[SSH Bootstrap] Ensure {{ acer_user }} can sudo without password"
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    line: "{{ acer_user }} ALL=(ALL) NOPASSWD: ALL"
    state: present
    validate: '/usr/sbin/visudo -cf %s'

# ---------------------------------------------------------------------------
# 2. Ensure .ssh directories exist for root and deploy user
# ---------------------------------------------------------------------------
- name: "[SSH Bootstrap] Ensure /root/.ssh directory exists"
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: "[SSH Bootstrap] Ensure {{ acer_user }} .ssh directory exists"
  ansible.builtin.file:
    path: "/home/{{ acer_user }}/.ssh"
    state: directory
    owner: "{{ acer_user }}"
    group: "{{ acer_user }}"
    mode: "0700"

# ---------------------------------------------------------------------------
# 3. Inject prod_key.pub into deploy user and root authorized_keys
# ---------------------------------------------------------------------------
- name: "[SSH Bootstrap] Inject prod_key.pub into {{ acer_user }} authorized_keys"
  ansible.posix.authorized_key:
    user: "{{ acer_user }}"
    state: present
    key: "{{ ssh_public_key }}"
    exclusive: false

- name: "[SSH Bootstrap] Inject prod_key.pub into /root/.ssh/authorized_keys"
  ansible.posix.authorized_key:
    user: root
    state: present
    key: "{{ ssh_public_key }}"
    exclusive: false

# ---------------------------------------------------------------------------
# 4. Harden sshd — pubkey-only root, explicit PubkeyAuthentication
# ---------------------------------------------------------------------------
- name: "[SSH Bootstrap] Enable root login via SSH (key-only)"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PermitRootLogin"
    line: "PermitRootLogin prohibit-password"
    state: present
    backup: true
  notify: Restart ssh

- name: "[SSH Bootstrap] Enable PubkeyAuthentication"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PubkeyAuthentication"
    line: "PubkeyAuthentication yes"
    state: present
  notify: Restart ssh

- name: "[SSH Bootstrap] Disable password authentication (key-only after bootstrap)"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
    state: present
  notify: Restart ssh

- name: "[SSH Bootstrap] Reduce LoginGraceTime"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?LoginGraceTime"
    line: "LoginGraceTime 30"
    state: present
  notify: Restart ssh

# ---------------------------------------------------------------------------
# 5. Validate config, restart sshd, reset connection for subsequent plays
# ---------------------------------------------------------------------------
- name: "[SSH Bootstrap] Validate sshd_config syntax"
  ansible.builtin.command: sshd -t
  changed_when: false
  register: _sshd_test
  failed_when: _sshd_test.rc != 0

- name: "[SSH Bootstrap] Apply sshd config changes"
  ansible.builtin.meta: flush_handlers

- name: "[SSH Bootstrap] Reset SSH connection (pick up new sshd + keys)"
  ansible.builtin.meta: reset_connection

- name: "[SSH Bootstrap] Summary"
  ansible.builtin.debug:
    msg: |
      ✅  SSH bootstrap complete.
          Host     : {{ inventory_hostname }} ({{ ansible_host }})
          Deploy   : {{ acer_user }} — prod_key injected
          Root key : injected into /root/.ssh/authorized_keys
          sshd     : PermitRootLogin prohibit-password, PubkeyAuthentication yes
          Next step: ./cli.sh ansible-ping  (verify-ssh.yml as root)
