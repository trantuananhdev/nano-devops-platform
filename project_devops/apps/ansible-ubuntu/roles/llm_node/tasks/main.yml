---
# roles/llm_node/tasks/main.yml
# Gemma 4 via llama.cpp server on Ubuntu
# T-31: Caddy TLS reverse proxy + node-exporter + promtail log shipping
# T-55: tutinhhao sở hữu /opt/llm-node, chạy docker compose không sudo

# ---------------------------------------------------------------------------
# 1. Directory layout — owner: tutinhhao (app_user)
# ---------------------------------------------------------------------------
- name: "[LLM] Ensure app directory"
  ansible.builtin.file:
    path: "{{ llm_app_dir }}"
    state: directory
    owner: "{{ llm_app_owner }}"
    group: "{{ llm_app_owner }}"
    mode: "0755"

- name: "[LLM] Ensure models directory"
  ansible.builtin.file:
    path: "{{ llm_app_dir }}/models"
    state: directory
    owner: "{{ llm_app_owner }}"
    group: "{{ llm_app_owner }}"
    mode: "0755"

- name: "[LLM] Ensure caddy config directory"
  ansible.builtin.file:
    path: "{{ llm_app_dir }}/caddy"
    state: directory
    owner: "{{ llm_app_owner }}"
    group: "{{ llm_app_owner }}"
    mode: "0755"

- name: "[LLM] Ensure caddy data directory (cert persistence)"
  ansible.builtin.file:
    path: "{{ llm_app_dir }}/caddy-data"
    state: directory
    owner: "{{ llm_app_owner }}"
    group: "{{ llm_app_owner }}"
    mode: "0755"

- name: "[LLM] Ensure promtail config directory"
  ansible.builtin.file:
    path: "{{ llm_app_dir }}/promtail"
    state: directory
    owner: "{{ llm_app_owner }}"
    group: "{{ llm_app_owner }}"
    mode: "0755"

# ---------------------------------------------------------------------------
# 2. Download Gemma 4 model (one-time, may take a while)
# ---------------------------------------------------------------------------
- name: "[LLM] Check if model already downloaded"
  ansible.builtin.stat:
    path: "{{ llm_app_dir }}/models/{{ llm_model_file }}"
  register: _llm_model_stat

- name: "[LLM] Ensure pipx is installed (PEP 668 — Ubuntu 22.04+ externally-managed)"
  ansible.builtin.apt:
    name:
      - pipx
      - python3-venv
    state: present
  when: not _llm_model_stat.stat.exists

- name: "[LLM] Install huggingface_hub[cli] via pipx (isolated venv, no --break-system-packages)"
  ansible.builtin.command:
    cmd: pipx install "huggingface_hub[cli]"
  args:
    creates: "/home/{{ llm_app_owner }}/.local/bin/huggingface-cli"
  environment:
    HOME: "/home/{{ llm_app_owner }}"
    PIPX_HOME: "/home/{{ llm_app_owner }}/.local/pipx"
    PIPX_BIN_DIR: "/home/{{ llm_app_owner }}/.local/bin"
    PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  become: true
  become_user: "{{ llm_app_owner }}"
  when: not _llm_model_stat.stat.exists
  register: _pipx_install
  changed_when: _pipx_install.rc == 0 and 'installed package' in (_pipx_install.stdout | default(''))

- name: "[LLM] Download Google Gemma 4 QAT GGUF model"
  ansible.builtin.command: >
    huggingface-cli download {{ llm_hf_repo }}
    {{ llm_model_file }}
    --local-dir "{{ llm_app_dir }}/models"
    --local-dir-use-symlinks False
  environment:
    HF_TOKEN: "{{ hf_token | default(llm_hf_token) | default('') }}"
    # pipx installs huggingface-cli to ~/.local/bin — must be in PATH
    HOME: "/home/{{ llm_app_owner }}"
    PATH: "/home/{{ llm_app_owner }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  args:
    creates: "{{ llm_app_dir }}/models/{{ llm_model_file }}"
  when: not _llm_model_stat.stat.exists
  become: true
  become_user: "{{ llm_app_owner }}"
  register: hf_download_result
  changed_when: hf_download_result.rc == 0 and 'Downloading' in hf_download_result.stdout

# ---------------------------------------------------------------------------
# 3. Template configs — owner tutinhhao
# ---------------------------------------------------------------------------
- name: "[LLM] Deploy Caddyfile"
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ llm_app_dir }}/caddy/Caddyfile"
    owner: "{{ llm_app_owner }}"
    group: "{{ llm_app_owner }}"
    mode: "0644"
  notify: Restart llama-server

- name: "[LLM] Deploy promtail config"
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: "{{ llm_app_dir }}/promtail/config.yml"
    owner: "{{ llm_app_owner }}"
    group: "{{ llm_app_owner }}"
    mode: "0644"
  when: llm_log_shipping_enabled | bool
  notify: Restart llama-server

- name: "[LLM] Deploy docker-compose for full LLM stack"
  ansible.builtin.template:
    src: docker-compose.llm.yml.j2
    dest: "{{ llm_app_dir }}/docker-compose.yml"
    owner: "{{ llm_app_owner }}"
    group: "{{ llm_app_owner }}"
    mode: "0644"
  notify: Restart llama-server

# ---------------------------------------------------------------------------
# 4. Start compose stack
#    T-55: become: false — tutinhhao thuộc docker group, chạy trực tiếp
#    T-63: ignore_errors: true — compose up return sau khi containers started,
#           nhưng llama-server cần 3-8 phút load model. Health state được
#           kiểm tra riêng bằng uri retry loop bên dưỡi.
# ---------------------------------------------------------------------------
- name: "[LLM] Start LLM stack (llama-server + caddy + node-exporter + promtail)"
  community.docker.docker_compose_v2:
    project_src: "{{ llm_app_dir }}"
    state: present
    pull: always
  become: false            # tutinhhao in docker group — không cần sudo
  ignore_errors: true      # T-63: containers có thể ở 'starting' state khi compose up return
  register: _compose_up

- name: "[LLM] Verify critical containers were created (not just errored)"
  ansible.builtin.debug:
    msg: |
      Docker Compose up: {{ _compose_up.failed | ternary('⚠️ partial — checking containers', '✅ clean') }}
      {% if _compose_up.containers is defined %}
      Containers created: {{ _compose_up.containers | map(attribute='Name') | list | join(', ') }}
      {% endif %}

# ---------------------------------------------------------------------------
# 5. UFW rules — cần root (become: true kế thừa từ playbook)
# ---------------------------------------------------------------------------
- name: "[LLM] UFW allow HTTP proxy port {{ llm_port }} from VM"
  community.general.ufw:
    rule: allow
    port: "{{ llm_port }}"
    proto: tcp
    from_ip: "{{ vm_ip }}"
    comment: "LLM Caddy HTTP from Alpine VM"

- name: "[LLM] UFW allow HTTPS port {{ llm_tls_port }} from VM (Caddy TLS)"
  community.general.ufw:
    rule: allow
    port: "{{ llm_tls_port }}"
    proto: tcp
    from_ip: "{{ vm_ip }}"
    comment: "LLM Caddy HTTPS from Alpine VM"
  when: llm_tls_enabled | bool

- name: "[LLM] UFW allow node-exporter {{ node_exporter_port }} from VM (metrics scrape)"
  community.general.ufw:
    rule: allow
    port: "{{ node_exporter_port }}"
    proto: tcp
    from_ip: "{{ vm_ip }}"
    comment: "LLM node-exporter for Prometheus scrape"
  when: llm_metrics_enabled | bool

# ---------------------------------------------------------------------------
# 6. Health-check llama-server via Caddy proxy
#    T-62: Dùng ansible_host (IP Ubuntu) vì Ansible runner chạy trên Alpine VM
#           127.0.0.1 sẽ trỏ về Alpine VM — không phải Ubuntu → luôn fail.
#    T-62: Tăng retries 30→60 (600s) vì Gemma 4 ~3.35GB cần 3-8 phút mmap.
# ---------------------------------------------------------------------------
- name: "[LLM] Wait for llama-server health (via Caddy HTTP)"
  ansible.builtin.uri:
    url: "http://{{ ansible_host | default(inventory_hostname) }}:{{ llm_port }}/health"
    method: GET
    status_code: [200]
    timeout: 10
  register: _llm_health
  retries: 60
  delay: 10
  until: _llm_health.status == 200
  ignore_errors: true   # Log warning but don't fail deploy — model may need extra time

- name: "[LLM] Warn if health check did not pass yet"
  ansible.builtin.debug:
    msg: |
      ⚠️  llama-server health check timed out after 600s.
          Model đang load hoặc Caddy chưa sẵn sàng.
          Kiểm tra thủ công: curl http://{{ ansible_host | default(inventory_hostname) }}:{{ llm_port }}/health
          Xem logs: docker logs llama-server
  when: _llm_health is failed or _llm_health.status | default(0) != 200

- name: "[LLM] Wait for node-exporter metrics endpoint"
  ansible.builtin.uri:
    url: "http://{{ ansible_host | default(inventory_hostname) }}:{{ node_exporter_port }}/metrics"
    method: GET
    status_code: 200
  register: _node_exporter_health
  retries: 6
  delay: 5
  until: _node_exporter_health.status == 200
  when: llm_metrics_enabled | bool
  ignore_errors: true   # Non-blocking — metrics nice-to-have on first deploy

- name: "[LLM] Report deployment summary"
  ansible.builtin.debug:
    msg: |
      ════════════════════════════════════════
      LLM Node Deployment Complete
      ════════════════════════════════════════
      User          : {{ llm_app_owner }} (app owner)
      llama-server  : 127.0.0.1:{{ llm_internal_port }} (internal)
      Caddy HTTP    : http://{{ ansible_host | default(inventory_hostname) }}:{{ llm_port }}
      Caddy HTTPS   : https://{{ ansible_host | default(inventory_hostname) }}:{{ llm_tls_port }}
      node-exporter : :{{ node_exporter_port }}/metrics
      log shipping  : {{ 'enabled → ' + loki_url if llm_log_shipping_enabled else 'disabled' }}
      ════════════════════════════════════════
