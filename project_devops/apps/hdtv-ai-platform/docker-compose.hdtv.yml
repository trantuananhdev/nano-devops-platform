# HDTV AI Platform — Standalone App Stack (dev / WSL / direct docker compose)
# LLM chạy riêng trên Ubuntu (llama-server)
#
# Passwords đọc từ Docker secrets → /run/secrets/<name>  (KHÔNG hardcode trong env)
# Secret files: project_devops/platform/secrets/*.txt  (gitignored)
#
# Chạy từ repo root:
#   docker compose --env-file .env -f project_devops/apps/hdtv-ai-platform/docker-compose.hdtv.yml up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: hdtv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${HDTV_POSTGRES_DB:-hdtv_db}
      POSTGRES_USER: ${HDTV_POSTGRES_USER:-hdtv_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/hdtv_postgres_password
    secrets:
      - hdtv_postgres_password
    volumes:
      - hdtv_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HDTV_POSTGRES_USER:-hdtv_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384m
    logging: *default-logging
    networks:
      - hdtv-net

  redis:
    image: redis:7-alpine
    container_name: hdtv-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128m
    logging: *default-logging
    networks:
      - hdtv-net

  chroma:
    image: chromadb/chroma:0.5.23
    container_name: hdtv-chroma
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - hdtv_chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 400m
    logging: *default-logging
    networks:
      - hdtv-net

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: hdtv-meilisearch
    restart: unless-stopped
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: development
      # Meilisearch không hỗ trợ _FILE suffix — đọc key từ entrypoint wrapper
      MEILI_MASTER_KEY_FILE: /run/secrets/meili_master_key
    entrypoint: >
      sh -c "
        export MEILI_MASTER_KEY=$$(cat /run/secrets/meili_master_key | tr -d '[:space:]');
        exec meilisearch
      "
    secrets:
      - meili_master_key
    volumes:
      - hdtv_meili_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256m
    logging: *default-logging
    networks:
      - hdtv-net

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: hdtv-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hdtv_minio}
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    secrets:
      - minio_root_password
    volumes:
      - hdtv_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256m
    logging: *default-logging
    networks:
      - hdtv-net

  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: hdtv-api
    restart: unless-stopped
    env_file:
      - ../../../.env
    environment:
      # Connection strings — password được inject từ secret file bởi config.py
      DATABASE_URL: postgresql+asyncpg://${HDTV_POSTGRES_USER:-hdtv_user}:placeholder@postgres:5432/${HDTV_POSTGRES_DB:-hdtv_db}
      HDTV_POSTGRES_PASSWORD_FILE: /run/secrets/hdtv_postgres_password
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hdtv_minio}
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY_FILE: /run/secrets/meili_master_key
      LLM_BASE_URL: "http://${ACER_HOST:-192.168.1.248}:8080/v1"
    secrets:
      - hdtv_postgres_password
      - minio_root_password
      - meili_master_key
    labels:
      prometheus.scrape: "true"
      prometheus.job: "hdtv-ai"
      prometheus.port: "8000"
      prometheus.path: "/metrics"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      chroma:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384m
    logging: *default-logging
    networks:
      - hdtv-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: hdtv-worker
    restart: unless-stopped
    env_file:
      - ../../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${HDTV_POSTGRES_USER:-hdtv_user}:placeholder@postgres:5432/${HDTV_POSTGRES_DB:-hdtv_db}
      HDTV_POSTGRES_PASSWORD_FILE: /run/secrets/hdtv_postgres_password
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY_FILE: /run/secrets/meili_master_key
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hdtv_minio}
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      LLM_BASE_URL: "http://${ACER_HOST:-192.168.1.248}:8080/v1"
    secrets:
      - hdtv_postgres_password
      - minio_root_password
      - meili_master_key
    volumes:
      - hdtv_rag_docs:/opt/rag-docs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
    logging: *default-logging
    networks:
      - hdtv-net

  beat:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: hdtv-beat
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    env_file:
      - ../../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${HDTV_POSTGRES_USER:-hdtv_user}:placeholder@postgres:5432/${HDTV_POSTGRES_DB:-hdtv_db}
      HDTV_POSTGRES_PASSWORD_FILE: /run/secrets/hdtv_postgres_password
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      LLM_BASE_URL: "http://${ACER_HOST:-192.168.1.248}:8080/v1"
    secrets:
      - hdtv_postgres_password
    volumes:
      - hdtv_rag_docs:/opt/rag-docs
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64m
    logging: *default-logging
    networks:
      - hdtv-net

  frontend:
    build:
      context: ../hdtv-ai-prototype
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_WS_BASE_URL: ""
    container_name: hdtv-frontend
    restart: unless-stopped
    ports:
      - "3080:80"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64m
    logging: *default-logging
    networks:
      - hdtv-net

# ---------------------------------------------------------------------------
# Secrets — đọc từ project_devops/platform/secrets/*.txt  (gitignored)
# Path relative to this file's directory
# ---------------------------------------------------------------------------
secrets:
  hdtv_postgres_password:
    file: ../../platform/secrets/hdtv_postgres_password.txt
  minio_root_password:
    file: ../../platform/secrets/minio_root_password.txt
  meili_master_key:
    file: ../../platform/secrets/meili_master_key.txt

volumes:
  hdtv_pg_data:
  hdtv_chroma_data:
  hdtv_minio_data:
  hdtv_meili_data:
  hdtv_rag_docs:

networks:
  hdtv-net:
    driver: bridge
