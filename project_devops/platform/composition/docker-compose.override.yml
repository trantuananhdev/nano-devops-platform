version: '3.8'

# Docker Compose Override for Nano DevOps Platform
# Purpose: Local Windows/Docker Desktop development overrides
#
# Auto-applied when running: docker compose up -d
# (Docker merges docker-compose.yml + docker-compose.override.yml automatically)
#
# On Alpine VM: cli.sh uses docker-compose.vm.yml instead for bind mounts.

services:
  platform-postgres:
    # Expose port for local debugging
    ports:
      - "5432:5432"

  platform-redis:
    ports:
      - "6379:6379"
