version: '3.8'

# Nano DevOps Platform - Applications
# Focus: Odoo, Microservices

x-logging:
  &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # Application Layer - Odoo 16 (TEMPORARILY DISABLED for resource testing)
  # odoo:
  #   image: odoo:16.0
  #   container_name: platform-odoo
  #   restart: unless-stopped
  #   environment:
  #     - HOST=platform-postgres
