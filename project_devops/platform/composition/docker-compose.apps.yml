  # ---------------------------------------------------------------------------
  # Ops tooling — Ansible Runner (Acer AI Host provisioner)
  # ---------------------------------------------------------------------------
  # This service is NOT started with the default stack.
  # It only runs on-demand via `docker compose run`.
  #
  # Usage:
  #   docker compose -f docker-compose.apps.yml run --rm ansible-runner site.yml
  #   docker compose -f docker-compose.apps.yml run --rm ansible-runner verify-ssh.yml
  #   docker compose -f docker-compose.apps.yml run --rm ansible-runner bootstrap-ssh.yml \
  #     --ask-pass --ask-become-pass
  # ---------------------------------------------------------------------------
  ansible-runner:
    build:
      context: ../../apps/ansible-ubuntu
      dockerfile: Dockerfile
    container_name: platform-ansible-runner
    restart: "no"
    profiles:
      - ops                            # excluded from default `docker compose up`
    working_dir: /ansible
    environment:
      ANSIBLE_HOST_KEY_CHECKING: "False"
      ANSIBLE_FORCE_COLOR: "1"
      ACER_HOST: "${ACER_HOST}"
      ACER_SSH_PORT: "${ACER_SSH_PORT}"
      HF_TOKEN: "${HF_TOKEN:-}"
      # Ansible connects root@ACER_HOST via prod_deployer key (no password).
      # Key is mounted via Docker secret /run/secrets/prod_deployer.
    volumes:
      - ../../apps/ansible-ubuntu:/ansible
    secrets:
      - prod_deployer                  # SSH private key — mounted at /run/secrets/prod_deployer
    networks:
      - platform-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *default-logging

networks:
  platform-network:
    external: true

