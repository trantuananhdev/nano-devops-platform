# Prometheus Configuration with Docker Service Discovery
# This configuration enables automatic discovery of services to monitor.

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: 'nano-platform'
    environment: 'production'

alerting:
  alertmanagers:
  - static_configs:
    - targets:
      - 'platform-alertmanager:9093'

# Alert rules
rule_files:
  - '/etc/prometheus/alerts/*.yml'

# Scrape configurations
scrape_configs:
  # Prometheus itself (still static as it's the core)
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Docker Service Discovery for all other containerized services
  - job_name: 'docker-services'
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
    relabel_configs:
      # --- Filtering: Only keep containers with the 'prometheus.scrape=true' label ---
      - source_labels: [__meta_docker_container_label_prometheus_scrape]
        action: keep
        regex: true

      # --- Job Label: Set the job name from the 'prometheus.job' label ---
      - source_labels: [__meta_docker_container_label_prometheus_job]
        action: replace
        target_label: job

      # --- Address/Port: Create the scrape address from container name and port label ---
      - source_labels: [__meta_docker_container_name, __meta_docker_container_label_prometheus_port]
        action: replace
        regex: \/(.*);(.*)
        replacement: $1:$2
        target_label: __address__

      # --- Metrics Path: Set the metrics path from the 'prometheus.path' label (default to /metrics) ---
      - source_labels: [__meta_docker_container_label_prometheus_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
        replacement: $1

  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - https://odoo:8069/web/login
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: __address__
        replacement: platform-blackbox-exporter:9115
      - target_label: instance
        replacement: odoo
