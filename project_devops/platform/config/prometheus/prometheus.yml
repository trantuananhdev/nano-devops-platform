# Prometheus Configuration with Docker Service Discovery
# Auto-discovers containers labeled prometheus.scrape=true on platform-network.

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: 'nano-platform'
    environment: 'production'

alerting:
  alertmanagers:
  - static_configs:
    - targets:
      - 'platform-alertmanager:9093'

rule_files:
  - '/etc/prometheus/alerts/*.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'docker-services'
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        filters:
          - name: network
            values: ['platform-network']
    relabel_configs:
      - source_labels: [__meta_docker_container_label_prometheus_scrape]
        action: keep
        regex: true

      - source_labels: [__meta_docker_container_label_prometheus_job]
        action: replace
        target_label: job

      - source_labels: [__meta_docker_network_ip, __meta_docker_container_label_prometheus_port]
        action: replace
        regex: (.+);(.+)
        replacement: $1:$2
        target_label: __address__

      - source_labels: [__meta_docker_container_label_prometheus_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
        replacement: $1

      - source_labels: [__meta_docker_container_label_prometheus_path]
        action: replace
        target_label: __metrics_path__
        regex: ^$
        replacement: /metrics

      - source_labels: [__meta_docker_container_name]
        action: replace
        target_label: instance
        regex: /(.*)
        replacement: $1

  # HTTPS uptime via blackbox (dev wildcard cert — module skips verify)
  - job_name: 'blackbox-https'
    metrics_path: /probe
    params:
      module: [https_2xx_insecure]
    static_configs:
      - targets:
        - https://health.nano.platform/health
        - https://data.nano.platform/health
        - https://aggregator.nano.platform/health
        - https://user.nano.platform/health
        - https://faulty.nano.platform/status
        - https://ai.nano.platform/healthz
        - https://crm-ingest.nano.platform/health
        - https://crm-demo.nano.platform/
        - https://grafana.nano.platform/api/health
        - https://prometheus.nano.platform/-/healthy
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: __address__
        replacement: platform-blackbox-exporter:9115
      - source_labels: [__param_target]
        target_label: instance
        regex: 'https://([^/]+).*'
        replacement: $1
