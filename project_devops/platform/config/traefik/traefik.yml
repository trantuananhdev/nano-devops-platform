# Traefik Configuration
# Edge Layer - Reverse Proxy

api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    http:
      tls: {}

ping: {}

# Prometheus metrics (scraped via docker_sd job=traefik)
metrics:
  prometheus:
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true

providers:
  docker:
    endpoint: "tcp://socket-proxy:2375"
    exposedByDefault: false
    network: platform-network
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

log:
  level: INFO
  format: json

accessLog:
  format: json

# Static TLS fallback (same files as dynamic.yml + generate_certs.sh)
tls:
  certificates:
    - certFile: /etc/traefik/certs/nano.platform.crt
      keyFile: /etc/traefik/certs/nano.platform.key
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/nano.platform.crt
        keyFile: /etc/traefik/certs/nano.platform.key
