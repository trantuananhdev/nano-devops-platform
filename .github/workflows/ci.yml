name: "CI: Build & Push EcoIT Images"

# =============================================================================
# CI FAST MODE: Trial 10 ngày
# Chỉ focus vào:
#   1. Build Docker image cho ecoit-app
#   2. Push lên GHCR
# Các bước Lint, SAST, Scan, Test, Build Platform khác đã bị comment lại để tăng tốc.
# =============================================================================

on:
  push:
    branches: ["**"]
    paths:
      - "project_devops/apps/ecoit-app/**"
      - "project_devops/apps/ansible-ubuntu/**"
      # --- Đã comment các paths không cần thiết ---
      # - "project_devops/apps/health-api/**"
      # - "project_devops/apps/data-api/**"
      # - "project_devops/apps/aggregator-api/**"
      # - "project_devops/apps/user-api/**"
      # - "project_devops/apps/faulty-service/**"
      # - "project_devops/platform/**"
      # - "project_devops/ci/**"
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # STAGE 1: Detect what changed
  # ---------------------------------------------------------------------------
  detect-changes:
    name: "Detect Changes"
    runs-on: ubuntu-24.04
    outputs:
      ecoit_changed: ${{ steps.filter.outputs.ecoit-app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ecoit-app: 'project_devops/apps/ecoit-app/**'

  # ---------------------------------------------------------------------------
  # STAGE 2: Security & Quality (DISABLED FOR SPEED)
  # ---------------------------------------------------------------------------
  # lint-and-scan:
  #   name: "Security & Quality"
  #   runs-on: ubuntu-24.04
  #   continue-on-error: true
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Gitleaks — Secret scan
  #       uses: gitleaks/gitleaks-action@v2
  #     - name: Hadolint — Dockerfile lint
  #       uses: hadolint/hadolint-action@v3.1.0
  #     - name: Semgrep SAST
  #       uses: returntocorp/semgrep-action@v1

  # ---------------------------------------------------------------------------
  # STAGE 3: Build & Push EcoIT images
  # ---------------------------------------------------------------------------
  build-ecoit:
    name: "Build & Push EcoIT → GHCR"
    runs-on: ubuntu-24.04
    needs: [detect-changes]
    # Luôn build nếu push vào thư mục ecoit-app
    if: needs.detect-changes.outputs.ecoit_changed == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # - name: Run tests (DISABLED FOR SPEED)
      #   run: bash project_devops/apps/ecoit-app/test.sh

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: project_devops/apps/ecoit-app
          file: project_devops/apps/ecoit-app/Dockerfile.backend
          push: ${{ github.ref == 'refs/heads/main' }}   # only push on main
          load: ${{ github.ref != 'refs/heads/main' }}   # load for scan on PRs
          tags: |
            ghcr.io/${{ github.repository_owner }}/ecoit-app-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/ecoit-app-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: project_devops/apps/ecoit-app
          file: project_devops/apps/ecoit-app/Dockerfile.frontend
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/ecoit-app-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/ecoit-app-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # - name: Scan Backend image (DISABLED FOR SPEED)
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     ...

      - name: Notify — image ready for deploy
        if: github.ref == 'refs/heads/main'
        run: |
          echo "✅ Images pushed to GHCR:"
          echo "   ghcr.io/${{ github.repository_owner }}/ecoit-app-backend:${{ github.sha }}"
          echo "   ghcr.io/${{ github.repository_owner }}/ecoit-app-frontend:${{ github.sha }}"
          echo ""
          echo "📦 Deploy to Acer Ubuntu (from your Alpine VM):"
          echo "   vagrant ssh"
          echo "   ./cli.sh ansible-deploy ${{ github.sha }}"

  # ---------------------------------------------------------------------------
  # STAGE 4: Build other platform services (DISABLED FOR SPEED)
  # ---------------------------------------------------------------------------
  # build-platform-services:
  #   ... (Commented out to save time)

  # ---------------------------------------------------------------------------
  # STAGE 5: Final Status
  # ---------------------------------------------------------------------------
  ci-status:
    name: "✅ CI Status"
    runs-on: ubuntu-24.04
    needs: [build-ecoit]
    if: always()
    steps:
      - name: Final check
        run: |
          ECOIT="${{ needs.build-ecoit.result }}"
          echo "EcoIT build: ${ECOIT:-skipped}"
          if [[ "$ECOIT" == "failure" ]]; then
            echo "❌ Build failed"; exit 1
          fi
          echo "✅ CI passed"
