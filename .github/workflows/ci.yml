name: "CI: Build & Push EcoIT Images"

# =============================================================================
# CI chỉ làm 2 việc:
#   1. Build Docker image
#   2. Push lên GHCR
# Deploy sang Ubuntu Acer làm RIÊNG bằng ./cli.sh ansible-deploy trên VM
# Lý do: Acer Ubuntu nằm trên LAN nội bộ — GitHub runner không SSH vào được.
# =============================================================================

on:
  push:
    branches: ["**"]
    paths:
      - "project_devops/apps/ecoit-app/**"
      - "project_devops/apps/health-api/**"
      - "project_devops/apps/data-api/**"
      - "project_devops/apps/aggregator-api/**"
      - "project_devops/apps/user-api/**"
      - "project_devops/apps/faulty-service/**"
      - "project_devops/apps/ansible-ubuntu/**"
      - "project_devops/platform/**"
      - "project_devops/ci/**"
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # STAGE 1: Detect what changed
  # ---------------------------------------------------------------------------
  detect-changes:
    name: "Detect Changes"
    runs-on: ubuntu-24.04
    outputs:
      ecoit_changed: ${{ steps.filter.outputs.ecoit-app }}
      services: ${{ steps.filter.outputs.changes }}
      infra_changed: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # --- EcoIT Trial (ACTIVE) ---
            ecoit-app: 'project_devops/apps/ecoit-app/**'
            # --- Platform services ---
            health-api: 'project_devops/apps/health-api/**'
            data-api: 'project_devops/apps/data-api/**'
            aggregator-api: 'project_devops/apps/aggregator-api/**'
            user-api: 'project_devops/apps/user-api/**'
            faulty-service: 'project_devops/apps/faulty-service/**'
            # --- Ansible runner ---
            ansible-ubuntu: 'project_devops/apps/ansible-ubuntu/**'
            # --- Infrastructure ---
            infra:
              - 'project_devops/platform/**'
              - 'project_devops/ci/**'

  # ---------------------------------------------------------------------------
  # STAGE 2: Security & Quality (parallel, non-blocking)
  # ---------------------------------------------------------------------------
  lint-and-scan:
    name: "Security & Quality"
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks — Secret scan
        uses: gitleaks/gitleaks-action@v2
        with:
          exit-code: 1

      - name: Hadolint — Dockerfile lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: error

      - name: Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/default

  # ---------------------------------------------------------------------------
  # STAGE 3: Build & Push EcoIT images (only when ecoit-app changes)
  # ---------------------------------------------------------------------------
  build-ecoit:
    name: "Build & Push EcoIT → GHCR"
    runs-on: ubuntu-24.04
    needs: [detect-changes]
    if: needs.detect-changes.outputs.ecoit_changed == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: bash project_devops/apps/ecoit-app/test.sh

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: project_devops/apps/ecoit-app
          file: project_devops/apps/ecoit-app/Dockerfile.backend
          push: ${{ github.ref == 'refs/heads/main' }}   # only push on main
          load: ${{ github.ref != 'refs/heads/main' }}   # load for scan on PRs
          tags: |
            ghcr.io/${{ github.repository_owner }}/ecoit-app-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/ecoit-app-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: project_devops/apps/ecoit-app
          file: project_devops/apps/ecoit-app/Dockerfile.frontend
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/ecoit-app-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/ecoit-app-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Backend image
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/ecoit-app-backend:${{ github.sha }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Notify — image ready for deploy
        if: github.ref == 'refs/heads/main'
        run: |
          echo "✅ Images pushed to GHCR:"
          echo "   ghcr.io/${{ github.repository_owner }}/ecoit-app-backend:${{ github.sha }}"
          echo "   ghcr.io/${{ github.repository_owner }}/ecoit-app-frontend:${{ github.sha }}"
          echo ""
          echo "📦 Deploy to Acer Ubuntu (from your Alpine VM):"
          echo "   vagrant ssh"
          echo "   ./cli.sh ansible-deploy ${{ github.sha }}"

  # ---------------------------------------------------------------------------
  # STAGE 4: Build other platform services (matrix — non EcoIT)
  # ---------------------------------------------------------------------------
  build-platform-services:
    name: "Build Platform Services"
    runs-on: ubuntu-24.04
    needs: [detect-changes]
    if: >
      needs.detect-changes.outputs.services != '[]' &&
      needs.detect-changes.outputs.services != '["infra"]' &&
      needs.detect-changes.outputs.ecoit_changed != 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    steps:
      - name: Skip non-buildable keys
        if: matrix.service == 'infra' || matrix.service == 'ansible-ubuntu'
        run: echo "Skipping build for ${{ matrix.service }}"

      - uses: actions/checkout@v4
        if: matrix.service != 'infra' && matrix.service != 'ansible-ubuntu'

      - name: Set up Docker Buildx
        if: matrix.service != 'infra' && matrix.service != 'ansible-ubuntu'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: matrix.service != 'infra' && matrix.service != 'ansible-ubuntu'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Unit Test
        if: matrix.service != 'infra' && matrix.service != 'ansible-ubuntu'
        run: |
          if [ -f "./project_devops/apps/${{ matrix.service }}/test.sh" ]; then
            bash ./project_devops/apps/${{ matrix.service }}/test.sh
          else
            echo "No tests for ${{ matrix.service }}, skipping."
          fi

      - name: Build & Push
        if: matrix.service != 'infra' && matrix.service != 'ansible-ubuntu'
        uses: docker/build-push-action@v5
        with:
          context: project_devops/apps/${{ matrix.service }}
          file: project_devops/apps/${{ matrix.service }}/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # STAGE 5: Final Status
  # ---------------------------------------------------------------------------
  ci-status:
    name: "✅ CI Status"
    runs-on: ubuntu-24.04
    needs: [lint-and-scan, build-ecoit, build-platform-services]
    if: always()
    steps:
      - name: Final check
        run: |
          ECOIT="${{ needs.build-ecoit.result }}"
          PLATFORM="${{ needs.build-platform-services.result }}"
          echo "EcoIT build: ${ECOIT:-skipped}"
          echo "Platform build: ${PLATFORM:-skipped}"
          if [[ "$ECOIT" == "failure" || "$PLATFORM" == "failure" ]]; then
            echo "❌ Build failed"; exit 1
          fi
          echo "✅ CI passed"
