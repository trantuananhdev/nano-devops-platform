name: "CI: Build & Push HDTV Images"

# =============================================================================
# CI FAST MODE: Trial 10 ngày — HDTV AI Platform
# =============================================================================

on:
  push:
    branches: ["**"]
    paths:
      - "project_devops/apps/hdtv-ai-platform/**"
      - "project_devops/apps/hdtv-ai-prototype/**"
      - "project_devops/apps/ansible-ubuntu/**"
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: "Detect Changes"
    runs-on: ubuntu-24.04
    outputs:
      hdtv_platform: ${{ steps.filter.outputs.hdtv-platform }}
      hdtv_prototype: ${{ steps.filter.outputs.hdtv-prototype }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            hdtv-platform: 'project_devops/apps/hdtv-ai-platform/**'
            hdtv-prototype: 'project_devops/apps/hdtv-ai-prototype/**'

  build-hdtv:
    name: "Build & Push HDTV → GHCR"
    runs-on: ubuntu-24.04
    needs: [detect-changes]
    if: |
      needs.detect-changes.outputs.hdtv_platform == 'true' ||
      needs.detect-changes.outputs.hdtv_prototype == 'true' ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push API
        uses: docker/build-push-action@v5
        with:
          context: project_devops/apps/hdtv-ai-platform
          file: project_devops/apps/hdtv-ai-platform/Dockerfile.api
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/hdtv-ai-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/hdtv-ai-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Worker
        uses: docker/build-push-action@v5
        with:
          context: project_devops/apps/hdtv-ai-platform
          file: project_devops/apps/hdtv-ai-platform/Dockerfile.worker
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/hdtv-ai-worker:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/hdtv-ai-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: project_devops/apps/hdtv-ai-prototype
          file: project_devops/apps/hdtv-ai-prototype/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/hdtv-ai-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/hdtv-ai-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify — images ready
        if: github.ref == 'refs/heads/main'
        run: |
          echo "✅ HDTV images pushed to GHCR"
          echo "   ghcr.io/${{ github.repository_owner }}/hdtv-ai-api:${{ github.sha }}"
          echo "   ghcr.io/${{ github.repository_owner }}/hdtv-ai-worker:${{ github.sha }}"
          echo "   ghcr.io/${{ github.repository_owner }}/hdtv-ai-frontend:${{ github.sha }}"

  ci-status:
    name: "✅ CI Status"
    runs-on: ubuntu-24.04
    needs: [build-hdtv]
    if: always()
    steps:
      - name: Final check
        run: |
          HDTV="${{ needs.build-hdtv.result }}"
          echo "HDTV build: ${HDTV:-skipped}"
          if [[ "$HDTV" == "failure" ]]; then
            echo "❌ Build failed"; exit 1
          fi
          echo "✅ CI passed"
